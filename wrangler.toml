name = "all-in-one"
main = "index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Optional: set defaults here, or pass via token URL instead
# HIFI_INSTANCES = "https://your-instance.com"
# SC_CLIENT_ID = ""

# Upstash Redis — used for stream URLs, track metadata, Deezer sessions
# (keeps working exactly as before)
# [vars]
# UPSTASH_REDIS_REST_URL = ""
# UPSTASH_REDIS_REST_TOKEN = ""

# Cloudflare KV — used for ISRC/ID mappings (fast edge cache, never expires early)
# Run: npx wrangler kv:namespace create ISRC_CACHE
# Then paste the id below:
[[kv_namespaces]]
binding = "KV"
id = "8903748dc59b43ba870f056923d84839"

[observability]
enabled = true
